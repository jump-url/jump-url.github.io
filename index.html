<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    // 获取当前 query 参数
    const query = window.location.search;

    // 目标地址
    const target = "https://hwondo.com";

    // 拼接并跳转
    window.location.href = target + query;
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
